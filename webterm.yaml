server:
    bind: 0.0.0.0
    port: 8080
auth:
    mode: password
    password: root
    session_ttl: 24h0m0s
    csrf_secret: change-this-secret
    rate_limit_max: 10
    rate_limit_window: 10m
terminal:
    backend: tmux
    shell: /bin/zsh
    working_dir: "~/workspace"
    user: ""
    group: ""
policy:
    whitelist_enabled: false
    rules: []
sessions:
    max_sessions: 10
    idle_timeout: 24h0m0s
    snapshot_dir: "~/.webterm/snapshots"
    snapshot_interval: 5s
    snapshot_key: "change-me-snapshot"
logging:
    audit: true
    level: debug
