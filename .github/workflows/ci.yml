name: CI

on:
  push:
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Download modules
        run: go mod download
      - name: Go test
        run: go test ./...
      - name: Frontend install
        run: npm ci
        working-directory: frontend
      - name: Frontend build
        run: npm run build
        working-directory: frontend
      - name: Go build
        run: go build -tags embedout ./...
